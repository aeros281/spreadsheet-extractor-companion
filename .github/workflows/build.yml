name: Build Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          zip -r spreadsheet-extractor-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            popup.html \
            popup.js \
            content.js \
            icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          files: spreadsheet-extractor-v${{ steps.version.outputs.version }}.zip
